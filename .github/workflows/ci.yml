name: CI

on:
  push:
    branches: [master, dev]
  workflow_dispatch: {}
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dist
          path: dist/
