name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - run: cargo --version && rustc --version

      - run: pnpm install --frozen-lockfile

      - run: cargo fmt --all --check

      - run: cargo clippy --workspace -- -D warnings

      - run: cargo test --workspace

      # Build the analysis_core napi-rs binding before running pnpm tests
      # so the OPE-17 boundary spec finds an `analysis-core.node` artifact
      # without invoking cargo from inside vitest. The boundary spec also
      # rebuilds on demand if the artifact is missing, but doing it once
      # here keeps test runtime predictable.
      - run: node packages/node-bindings/analysis-core/scripts/build-native.mjs

      - run: pnpm build

      - run: pnpm test

      - name: vitest with OPENALICE_RUST_ANALYSIS=1 (analysis_core only)
        env:
          OPENALICE_RUST_ANALYSIS: '1'
        run: pnpm test -- src/domain/analysis
