[package]
name = "analysis-core-node-binding"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "OpenAlice analysis_core Node binding crate (Phase 2 parser slice; in-process napi-rs bridge per ADR-003, with optional debug-only CLI fallback)."

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "analysis-core-parse"
path = "src/bin/analysis_core_parse.rs"

[dependencies]
analysis-core = { path = "../../../crates/analysis-core" }
napi = { version = "3", default-features = false, features = ["napi4"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"
