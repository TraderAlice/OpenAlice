[package]
name = "analysis-core-node-binding"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "OpenAlice analysis_core Node binding crate (Phase 2 parser slice; CLI fallback shell, napi-rs bridge pending - see ADR-003)."

[lib]
crate-type = ["rlib"]

[[bin]]
name = "analysis-core-parse"
path = "src/bin/analysis_core_parse.rs"

[dependencies]
analysis-core = { path = "../../../crates/analysis-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
